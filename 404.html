<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Community Education Council, District 26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;700&family=Public+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#11233A; --blue:#1A4FA0; --blue-deep:#11356E; --amber:#F0A93C;
         --paper:#FCFCFA; --muted:#53627A;
         --serif:'Lora',Georgia,serif; --sans:'Public Sans',system-ui,-apple-system,sans-serif; }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;
       background:var(--paper);color:var(--ink);font-family:var(--sans);padding:24px;}
  .wrap{max-width:520px;}
  .code{font-family:var(--serif);font-size:5rem;font-weight:700;color:var(--blue-deep);line-height:1;margin:0;}
  h1{font-family:var(--serif);font-size:1.6rem;margin:.4em 0 .3em;}
  p{color:var(--muted);font-size:1.05rem;line-height:1.6;margin:0 0 1.6rem;}
  .btn{display:inline-block;background:var(--amber);color:var(--ink);font-weight:700;
       text-decoration:none;padding:13px 22px;border-radius:10px;}
  .btn:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}
</style>
</head>
<body>
  <div class="wrap">
    <p class="code">404</p>
    <h1>We couldn't find that page</h1>
    <p>The page you were looking for may have moved or no longer exists. Let's get you back to the council's home page.<br><span style="font-family:var(--serif)">找不到该页面 — 请返回首页。</span></p>
    <a class="btn" href="/">Back to home / 返回首页</a>
  </div>
</body>
</html>
